global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: urban-mlops-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: postgres-urbain-dw
    metrics_path: /metrics
    static_configs:
      - targets:
          - postgres_exporter:9187
